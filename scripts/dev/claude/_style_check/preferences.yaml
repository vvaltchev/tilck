# Tilck style_check -- ranked-preference data for v2 prettiness scoring.
#
# This file is the machine-readable record of the ranked-preference Q&A
# loop. The style_check tool reads it to fit prettiness coefficients
# per topic. Each entry is one question.
#
# Schema for each entry under `questions:`:
#
#   id:        short kebab-case identifier, unique within this file
#   topic:     one of the v2 categories (call-site / declarations /
#              control-flow / function-shape / expressions / comments /
#              naming / macros / whitespace / file-org / structs)
#   date:      YYYY-MM-DD when the question was asked
#   prompt:    one-line summary of the trade-off the question explores
#   snippets:  list of code variants. Each:
#                label:  "1" / "2" / ...
#                code:   C source (literal, multi-line OK)
#                desc:   one-line note on what makes this variant distinct
#   guess:     Claude's pre-revealed ranking (e.g. [1, 3, 2])
#   ranking:   user's actual ranking (same format)
#   comment:   optional free-form user note
#   notes:     optional Claude observations after seeing the ranking
#   weight:    optional double; rough indication of how strongly the
#              user felt about this ranking (default 1.0)
#
# Coefficient fitting consumes this file; Claude does not edit
# entries after they're recorded (immutable history).

version: 1
questions:

  - id: q1-call-site-4arg-wrap
    topic: call-site
    date: 2026-05-20
    prompt: >
      How to wrap a 4-arg function call that exceeds 80 cols on one
      line. Args are independent (no semantic grouping).
    snippets:
      - label: "1"
        desc: Style 1 (aligned to opening paren), args packed
        code: |
          result = compute_with_context(curr_session, the_buffer_ptr,
                                        buffer_length, flags);
      - label: "2"
        desc: Style 2 strict -- `);` on its own line, one arg per line
        code: |
          result = compute_with_context(
             curr_session,
             the_buffer_ptr,
             buffer_length,
             flags
          );
      - label: "3"
        desc: Style 2 hybrid -- `);` at end of last arg, one arg per line
        code: |
          result = compute_with_context(
             curr_session,
             the_buffer_ptr,
             buffer_length,
             flags);
      - label: "4"
        desc: Style 1 (aligned to opening paren), one arg per line
        code: |
          result = compute_with_context(curr_session,
                                        the_buffer_ptr,
                                        buffer_length,
                                        flags);
    guess: ["4", "1", "3", "2"]
    ranking: ["2", "4", "1", "3"]
    comment: >
      Variants 2 and 4 are close, with a slight preference for 2.
      Variant 3 is completely unacceptable and should be a HARD rule.
    notes: >
      Claude's guess was significantly wrong (V2 ranked last, actually
      first). I had judged Style 2 strict as ceremonial overhead, but
      the user values the closing-paren-on-its-own-line symmetry. V3
      promoted from "acceptable Style 2 variant" to "hard-no": the
      one-arg-per-line layout REQUIRES `);` on its own line.
    weight: 1.0

  - id: q2-control-flow-nested-struct-cond
    topic: control-flow
    date: 2026-05-20
    prompt: >
      Two-clause if-condition that reads two fields of the same
      nested struct. Single-line braced form exceeds 80 cols.
    snippets:
      - label: "1"
        desc: Accept brace-on-own-line, keep condition as-is
        code: |
          if (sess->conn->state != STATE_OPEN ||
              sess->conn->kind != KIND_TCP)
          {
             return -EINVAL;
          }
      - label: "2"
        desc: Extract each sub-expression to a named local
        code: |
          const int state = sess->conn->state;
          const int kind = sess->conn->kind;

          if (state != STATE_OPEN || kind != KIND_TCP) {
             return -EINVAL;
          }
      - label: "3"
        desc: Introduce a convenience pointer one level up
        code: |
          const struct conn *const c = sess->conn;

          if (c->state != STATE_OPEN || c->kind != KIND_TCP) {
             return -EINVAL;
          }
    guess: ["3", "2", "1"]
    ranking: ["3", "1", "2"]
    comment: ""
    notes: >
      Claude got V3 right (top) but had V2 over V1 -- user has V1 over
      V2. The "1-2 exprs" guidance in CLAUDE.md is the UPPER BOUND for
      when individual-extract is acceptable, not the preferred form.
      Two extracted locals (`state`, `kind`) lose semantic anchoring
      and add to function-local count; accepting brace-on-own-line
      preserves meaning at a single layout cost. Convenience pointer
      wins because it is the minimal-disturbance refactor: shortens
      the parent reference without renaming the leaf fields, so the
      original semantic shape is preserved while the wrapping
      disappears.
    weight: 1.0

  - id: q3-decl-const-short-types
    topic: declarations
    date: 2026-05-20
    prompt: >
      Function preamble with two read-only locals -- one struct
      pointer (not reassigned, fields mutated through it) and one int
      (read but never reassigned). Types are short; no visual-weight
      argument either way.
    snippets:
      - label: "1"
        desc: const where applicable, on both
        code: |
          struct task *const ti = get_curr_task();
          const int prio = ti->priority;
      - label: "2"
        desc: const on the pointer only (*const), not on the int
        code: |
          struct task *const ti = get_curr_task();
          int prio = ti->priority;
      - label: "3"
        desc: no const anywhere
        code: |
          struct task *ti = get_curr_task();
          int prio = ti->priority;
    guess: ["1", "3", "2"]
    ranking: ["1", "2", "3"]
    comment: ""
    notes: >
      Claude got V1 right (top) but had V2 last, ranked V3 above V2.
      I read "const on pointer but not on int" as an inconsistency
      penalty -- the user doesn't see it that way. Const is
      monotonically valuable: adding it where correct is a gain,
      missing it is a loss, partial-const is strictly better than
      no-const. There's no symmetry/consistency penalty for partial
      application. The visual-weight exception only fires at higher
      type-spelling thresholds (e.g. `enum task_state`).
    weight: 1.0

  - id: q4-function-def-signature-wrap
    topic: function-shape
    date: 2026-05-20
    prompt: >
      A 4-parameter function definition with a signature too long for
      one line. Return type is on its own line per existing rule;
      question is how to lay out the parameter list itself.
    snippets:
      - label: "1"
        desc: Style 1 packed (aligned to opening paren)
        code: |
          static int
          load_segment(fs_handle *elf_h, pdir_t *pdir,
                       Elf_Phdr *phdr, ulong *end_vaddr_ref)
          {
             /* ... */
          }
      - label: "2"
        desc: Style 1 one arg per line (aligned to opening paren)
        code: |
          static int
          load_segment(fs_handle *elf_h,
                       pdir_t *pdir,
                       Elf_Phdr *phdr,
                       ulong *end_vaddr_ref)
          {
             /* ... */
          }
      - label: "3"
        desc: Style 2 strict (`(` ends line, args indented +3, `)` on own line)
        code: |
          static int
          load_segment(
             fs_handle *elf_h,
             pdir_t *pdir,
             Elf_Phdr *phdr,
             ulong *end_vaddr_ref
          )
          {
             /* ... */
          }
      - label: "4"
        desc: Style 2 with `)` glued to last arg (one arg per line)
        code: |
          static int
          load_segment(
             fs_handle *elf_h,
             pdir_t *pdir,
             Elf_Phdr *phdr,
             ulong *end_vaddr_ref)
          {
             /* ... */
          }
    guess: ["2", "1", "3", "4"]
    ranking: ["2", "1", "3", "4"]
    comment: >
      V3 and V4 are equally ugly and unacceptable. HARD RULE.
    notes: >
      Claude got the top exactly right (V2 > V1) but had a slight
      preference for V3 over V4 -- user ties them as equally
      unacceptable. Key asymmetry with Q1: for CALLS, Style 2 strict
      was the user's TOP pick (the `);` on its own line gives
      statement-level closure); for DEFINITIONS, Style 2 in any form
      is hard-no because the `{` of the body already provides closure
      and a separate `)` line creates two adjacent single-character
      lines without earning its keep. Function defs use Style 1 only;
      within Style 1, one-arg-per-line beats packed.
    weight: 1.0
