  - id: q41-long-arg-types-function-decl
    topic: function-shape
    date: 2026-05-20
    prompt: >
      Function declaration with verbose struct-pointer arg types.
      Single-line signature too long. Three approaches: Style 1
      packed, Style 1 one-per-line, typedef the types to shorten.
    snippets:
      - label: "1"
        desc: Style 1 packed
        code: |
          static int
          register_handler(struct event_handler *h, struct subscription_filter *f,
                           struct dispatch_context *ctx, int flags);
      - label: "2"
        desc: Style 1 one arg per line
        code: |
          static int
          register_handler(struct event_handler *h,
                           struct subscription_filter *f,
                           struct dispatch_context *ctx,
                           int flags);
      - label: "3"
        desc: Introduce typedefs to shorten types
        code: |
          typedef struct event_handler *evt_handler_t;
          typedef struct subscription_filter *sub_filter_t;
          typedef struct dispatch_context *disp_ctx_t;

          static int
          register_handler(evt_handler_t h, sub_filter_t f, disp_ctx_t ctx, int flags);
    guess: ["2", "1", "3"]
    ranking: ["2", "1", "3"]
    comment: >
      Introducing typedefs JUST to shorten a single function's
      signature is usually not a good idea -- with the exception
      of function-pointer typedefs (Q39), which have their own
      rationale.

      For struct-pointer types like the example, the types are
      not THAT long; just format the signature with Style 1
      one-per-line.
    notes: >
      EXACT MATCH. The principle: typedefs are for ABSTRACTION,
      not for cosmetic line-fit hacks. A struct-pointer typedef
      earns its keep when:

        (a) reused widely across the codebase, OR
        (b) hides implementation details for a stable API.

      Introducing a typedef just to shorten one function's
      signature is the same anti-pattern as extracting a helper
      just to make a function smaller (Q32) -- restructure
      without justification.

      Function-pointer typedefs (Q39) clear this bar because
      function-pointer syntax in C is hard to read inline; the
      typedef provides real readability gain.

      Linter implication: when v2 considers a typedef-introduction
      suggestion, check whether the typedef would be reused 2+
      times or hides genuine implementation detail. Otherwise
      keep the inline form.
    weight: 1.0

  - id: q42-switch-multiple-case-labels
    topic: control-flow
    date: 2026-05-20
    prompt: >
      Three case labels share a single body (no per-case work).
      Three layouts: each label own line, packed on one line,
      each with /* fallthrough */ annotation.
    snippets:
      - label: "1"
        desc: Each case label on its own line, then shared body
        code: |
          switch (event) {
             case EV_TIMEOUT:
             case EV_CANCEL:
             case EV_ERROR:
                abort_request();
                break;
          }
      - label: "2"
        desc: Case labels packed on one line
        code: |
          switch (event) {
             case EV_TIMEOUT: case EV_CANCEL: case EV_ERROR:
                abort_request();
                break;
          }
      - label: "3"
        desc: Each case with `/* fallthrough */` annotation
        code: |
          switch (event) {
             case EV_TIMEOUT:
                /* fallthrough */
             case EV_CANCEL:
                /* fallthrough */
             case EV_ERROR:
                abort_request();
                break;
          }
    guess: ["1", "2", "3"]
    ranking: ["1", "3", "2"]
    comment: >
      V2 (packed) is FORBIDDEN.

      Fallthrough rule conditional on case body content:
        - Cases all empty (shared body only): NO fallthrough
          comment; V1 is perfectly clear without it.
        - Each case has its own body and falls through:
          /* fallthrough */ comment is MANDATORY between each.
    notes: >
      Two corrections to Claude's model:

      1. V2 (packed case labels) is hard rule violation.

      2. The /* fallthrough */ comment has a CONDITIONAL
         requirement -- not "always use" or "never use," but
         based on whether intermediate cases have bodies:

           empty cases -> NO comment (V3 here is over-decoration)
           non-empty cases that fall through -> comment mandatory

      This is mechanically detectable: walk CASE_STMT cursors;
      if a case's body is non-empty AND ends without
      break/return/goto AND falls through to the next case,
      check that a /* fallthrough */ (or fallthrough)
      comment appears immediately before the next case label.
      Empty cases (no body between this case label and the
      next) should NOT have such a comment.
    weight: 1.5

  - id: q43-multi-clause-assert
    topic: control-flow
    date: 2026-05-20
    prompt: >
      Multi-clause ASSERT condition checking heterogeneous task
      invariants. Doesn't fit on one line. Three approaches:
      combined wrap, extract to local, split into multiple
      ASSERTs.
    snippets:
      - label: "1"
        desc: Combined condition wrapped, single ASSERT
        code: |
          ASSERT(ti->state == TASK_STATE_RUNNING  &&
                 ti->process != NULL              &&
                 ti->ref_count > 0                &&
                 is_preemption_enabled());
      - label: "2"
        desc: Extract combined condition to a local
        code: |
          const bool task_runnable_with_owner =
             ti->state == TASK_STATE_RUNNING  &&
             ti->process != NULL              &&
             ti->ref_count > 0                &&
             is_preemption_enabled();

          ASSERT(task_runnable_with_owner);
      - label: "3"
        desc: Split into multiple separate ASSERTs
        code: |
          ASSERT(ti->state == TASK_STATE_RUNNING);
          ASSERT(ti->process != NULL);
          ASSERT(ti->ref_count > 0);
          ASSERT(is_preemption_enabled());
    guess: ["3", "1", "2"]
    ranking: ["3", "1", "2"]
    comment: >
      V2 "makes no sense" -- the local doesn't help anything;
      ASSERT failure on a combined bool gives even less info
      than V1.

      V3 is much better because when an ASSERT fires you know
      EXACTLY which case triggered it; V1 forces additional
      debugging to identify the failing clause.
    notes: >
      EXACT MATCH on ordering. V2 promoted from "less
      preferred" to "makes no sense" -- effectively forbidden
      because it strictly loses information vs V1.

      Principle: defensive checks should preserve DIAGNOSTIC
      SPECIFICITY on failure. Same flavor as Q26 (heterogeneous
      preconditions -> separate early-returns with specific
      error codes): when a check fires, knowing which sub-
      condition failed is high-value; collapsing them loses
      that for nothing.

      For the linter: detect ASSERT() with `&&`-conjoined
      operands of heterogeneous shape (different fields of the
      argument struct, different function calls, etc.); flag
      with suggestion to split into multiple ASSERTs.

      Homogeneous conjunctions (all range checks on the same
      variable: `0 <= x && x < N`) stay combined -- that's
      a single semantic check.
    weight: 1.5

