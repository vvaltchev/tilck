      Generalisation: the "typedef for abstraction not line-
      fit" rule from Q41 extends to function pointers too.
      The difference is the THRESHOLD: function-pointer
      typedefs clear the bar at lower reuse counts because
      inline function-pointer syntax is genuinely hard to
      parse, whereas struct-pointer typedefs need stronger
      justification to clear (the inline `struct foo *` form
      is already readable).

      Meta-observation surfaced (recorded on the Q39 entry
      revision): preferences CAN evolve through the loop. The
      YAML is "recorded thought as of [date]," not immutable.
      When a later question prompts a revision, update the
      earlier entry directly with a clear note.
    weight: 1.5

  - id: q47-explicit-type-constant
    topic: expressions
    date: 2026-05-20
    prompt: >
      32-bit hex constant carrying explicit type info. Three
      forms: literal with suffix, cast, type-specifying macro.
    snippets:
      - label: "1"
        desc: Literal with type suffix
        code: |
          const u32 mask = 0x1000u;
      - label: "2"
        desc: Cast to desired type
        code: |
          const u32 mask = (u32)0x1000;
      - label: "3"
        desc: Portable type-specifying macro
        code: |
          const u32 mask = UINT32_C(0x1000);
    guess: ["1", "2", "3"]
    ranking: ["1", "2", "3"]
    comment: ""
    notes: >
      EXACT MATCH. Type-carrying literals (suffix style) are
      the most natural way to express typed constants. Casts
      work but add verbose noise. Standard-library type
      macros (UINT32_C) are overkill for kernel-internal code.
    weight: 0.5

  - id: q48-return-computation
    topic: expressions
    date: 2026-05-20
    prompt: >
      A function computes and returns a moderately complex
      result. Three forms: inline in return, single local for
      the result, multiple intermediate locals.
    snippets:
      - label: "1"
        desc: Compute inline in the return
        code: |
          return base + offset * stride + (flag ? bonus : 0);
      - label: "2"
        desc: Single local for the result, then return
        code: |
          const int result = base + offset * stride + (flag ? bonus : 0);

          return result;
      - label: "3"
        desc: Split into named intermediate locals
        code: |
          const int scaled_offset = offset * stride;
          const int bonus_value = flag ? bonus : 0;

          return base + scaled_offset + bonus_value;
    guess: ["1", "2", "3"]
    ranking: ["1", "3", "2"]
    comment: >
      V2 adds no value -- it moves the same complex expression
      to a different line and pays the cost of an extra local
      without earning any simplification. "Very bad."

      V3 is acceptable because the COMPONENTS are simpler;
      named intermediate locals decompose the complex
      expression into smaller named parts.

      V1 vs V3 is a SOFT preference for this specific case
      (the expression isn't that complex). V3 strongly wins as
      the expression gets harder to parse.
    notes: >
      Wrong on V2 vs V3. Had V2 second; user puts V2 last
      with "very bad."

      Principle to add to extraction calculus: extraction
      needs SUBSTANTIVE justification. The forms identified
      so far:

        1. Reuse (Q32): extract when the sub-piece is used in
           multiple places.
        2. Dedup (Q10): extract when a single local replaces
           multiple references to the same expression.
        3. SIMPLIFICATION VIA DECOMPOSITION (NEW, Q48):
           extract when the resulting sub-expressions are
           simpler / better-named than the inline form.

      The Q48 V2 form fails ALL three -- it just relocates
      the same expression without dedup, reuse, or
      decomposition. That's why it ranks last as "very bad."

      For the linter: when ranking extract-to-local
      suggestions, check whether each proposed extraction
      yields a SIMPLER named sub-expression (V3-style) or
      just relocates the original (V2-style). Only the
      former is worth suggesting.

      Calibration of V1 vs V3 is fuzzy ("soft preference"
      depending on expression complexity). The linter can
      use rough proxies: number of operators, nesting depth,
      number of distinct identifiers. Below some threshold,
      keep V1; above, suggest V3.
    weight: 1.5

  - id: q49-function-many-args
    topic: function-shape
    date: 2026-05-20
    prompt: >
      Function with 6 parameters covering different aspects.
      Three approaches: flat one-per-line, bundle into config
      struct, split into smaller functions.
    snippets:
      - label: "1"
        desc: Flat parameter list, Style 1 one-per-line
        code: |
          int register_event_handler(struct task *ti,
                                     int event_type,
                                     int priority,
                                     int flags,
                                     event_handler_func handler,
                                     void *user_data);
      - label: "2"
        desc: Bundle related args into a config struct
        code: |
          struct event_handler_config { ... };
          int register_event_handler(const struct event_handler_config *cfg);
      - label: "3"
        desc: Split into smaller cohesive functions
        code: |
          int create_event_handler(...);
          int set_handler_priority(...);
          int set_handler_flags(...);
          int set_handler_user_data(...);
    guess: ["1", "2", "3"]
    ranking: ["1", "2", "3"]
    comment: >
      Context-dependent:

        Default (no need to store / pass the param set):
          [1, 2, 3]. Flat args win.

        Need to store the param set OR pass it across multiple
        functions (even if some don't use all fields):
          V2 wins -- the bundling earns its keep.

        V3 (split into many small functions) is usually
        AVOIDED -- too API-fragmenting.

      META: this is interface-design, not coding style. Out
      of the v2 tool's scope per Q19's boundary (extends it).
    notes: >
      Scope clarification recorded: API-design decisions
      (function decomposition, parameter bundling) are OUT
      of the v2 tool's scope. The tool sees the SHAPE of
      code, not the DESIGN of interfaces.

      This extends Q19's "naming-content out of scope" rule:
      both naming-content AND API-design are semantic
      decisions that depend on intent/usage the linter
      cannot mechanically determine.

      Linter implication: when the v2 model sees a function
      with many parameters, do NOT suggest "consider
      bundling these into a struct" -- that's a design call.
      The tool can verify the FORMATTING of the parameter
      list (Style 1 one-per-line per Q4) but not the choice
      of whether to bundle.
    weight: 1.0

  - id: q11-error-handling-cleanup
    topic: control-flow
    date: 2026-05-20
    prompt: >
      A function allocates two resources sequentially and must free
      both on every exit path. Three control-flow shapes for the
      error-handling structure.
    snippets:
      - label: "1"
        desc: Nested ifs with cleanup inline in each branch
        code: |
          static int
          do_work(void)
          {
             struct foo *a;
             int rc = -ENOMEM;

             a = alloc_foo();

             if (a) {

                struct bar *b = alloc_bar();

                if (b) {
                   rc = work(a, b);
                   free_bar(b);
                }

                free_foo(a);
             }

             return rc;
          }
      - label: "2"
        desc: >
          Early returns with cleanup duplicated. Locals declared at
          the top (NULL-initialised where the real assignment is
          deferred) so we don't introduce mid-block decls that are
          orthogonal to the variant being tested.
        code: |
          static int
          do_work(void)
          {
             struct foo *a = NULL;
             struct bar *b = NULL;
             int rc;

             a = alloc_foo();
             if (!a)
                return -ENOMEM;

             b = alloc_bar();
             if (!b) {
                free_foo(a);
                return -ENOMEM;
             }

             rc = work(a, b);
             free_bar(b);
             free_foo(a);
             return rc;
          }
      - label: "3"
        desc: >
          goto-out with consolidated cleanup. free_X(NULL) is a
          no-op in this codebase, so no `if (ptr)` guards before
          the frees -- they are not needed.
        code: |
          static int
          do_work(void)
          {
             struct foo *a = NULL;
             struct bar *b = NULL;
             int rc = -ENOMEM;

             a = alloc_foo();
             if (!a)
                goto out;

             b = alloc_bar();
             if (!b)
                goto out;

             rc = work(a, b);

          out:
             free_bar(b);
             free_foo(a);
             return rc;
          }
    guess: ["3", "2", "1"]
    ranking: ["3", "2", "1"]
    comment: >
      Default ranking for long fn with many allocations: [3, 2, 1].
      For 2 resources only (this case), V3 ~= V2 -- V2 is maybe a
      bit nicer than V3 because we avoid a goto. For a VERY short
      function whose body essentially boils down to `work(a, b)`,
      V1 becomes elegant -- could be the preferred form.

      Meta-rule: "if you're unsure, always pick variant 3, as it's
      never wrong."

      Two snippet corrections relative to what Claude originally
      posed: (a) V3 had `if (b)` / `if (a)` guards before the frees
      -- removed, because free_X(NULL) must be a no-op in this
      codebase; (b) V2 had mid-block declarations which are an
      orthogonal style issue -- locals moved to the top with NULL
      initialisation where the real assignment is deferred.
    notes: >
      Default ranking [3, 2, 1] matches my pre-guess. The richer
      picture is a context-dependent cascade:

        Function shape          | Preferred ranking
        ------------------------|------------------
        Very short body (V1 ~=  | [1, ...]    V1 best
          single call)          |
        Medium fn, 2 resources  | [3, 2, ...] or [2, 3, ...] (close)
        Long fn, many alloc     | [3, 2, 1]    V3 dominant

      The meta-rule "if unsure pick V3" works as a safe default --
      V3 is never WRONG even when V1 or V2 would be slightly
      nicer.

      Two new concrete rules surfaced from this question (recorded
      separately in preferences-notes.md):

      1. free_X(NULL) must be a no-op in this codebase. Cleanup
         code never needs `if (ptr)` guards before calling free.
         Variants that include such guards have an idiom error.

      2. For V2-style early-return-with-duplicated-cleanup, locals
         that get assigned later should be declared at the top
         with NULL initialisation, NOT introduced mid-block. The
         orthogonal C99/mixed-decl question doesn't justify
         propagating that pattern in error-handling examples.
    weight: 1.5
