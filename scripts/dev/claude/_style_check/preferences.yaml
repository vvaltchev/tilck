        code: |
          *ctx = (struct request_ctx) {
             .req       = r,
             .session   = sess,
             .flags     = flags,
             .timestamp = now,
          };
      - label: "2"
        desc: Designators with single-space, no alignment
        code: |
          *ctx = (struct request_ctx) {
             .req = r,
             .session = sess,
             .flags = flags,
             .timestamp = now,
          };
      - label: "3"
        desc: Positional initializers (no designators)
        code: |
          *ctx = (struct request_ctx) {
             r,
             sess,
             flags,
             now,
          };
    guess: ["1", "2", "3"]
    ranking: ["1", "2", "3"]
    comment: >
      V1 is by far the best (strong default). V2 acceptable when
      alignment forces lines too long. V3 acceptable ONLY when
      all of:
        a) the formatting helps fit each field init on a single
           line,
        b) the struct has 2-3 fields max,
        c) the values are self-evident from position (NOT
