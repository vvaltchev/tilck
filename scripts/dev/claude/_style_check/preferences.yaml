# Tilck style_check -- ranked-preference data for v2 prettiness scoring.
#
# This file is the machine-readable record of the ranked-preference Q&A
# loop. The style_check tool reads it to fit prettiness coefficients
# per topic. Each entry is one question.
#
# Schema for each entry under `questions:`:
#
#   id:        short kebab-case identifier, unique within this file
#   topic:     one of the v2 categories (call-site / declarations /
#              control-flow / function-shape / expressions / comments /
#              naming / macros / whitespace / file-org / structs)
#   date:      YYYY-MM-DD when the question was asked
#   prompt:    one-line summary of the trade-off the question explores
#   snippets:  list of code variants. Each:
#                label:  "1" / "2" / ...
#                code:   C source (literal, multi-line OK)
#                desc:   one-line note on what makes this variant distinct
#   guess:     Claude's pre-revealed ranking (e.g. [1, 3, 2])
#   ranking:   user's actual ranking (same format)
#   comment:   optional free-form user note
#   notes:     optional Claude observations after seeing the ranking
#   weight:    optional double; rough indication of how strongly the
#              user felt about this ranking (default 1.0)
#
# Coefficient fitting consumes this file; Claude does not edit
# entries after they're recorded (immutable history).

version: 1
questions:

  - id: q1-call-site-4arg-wrap
    topic: call-site
    date: 2026-05-20
    prompt: >
      How to wrap a 4-arg function call that exceeds 80 cols on one
      line. Args are independent (no semantic grouping).
    snippets:
      - label: "1"
        desc: Style 1 (aligned to opening paren), args packed
        code: |
          result = compute_with_context(curr_session, the_buffer_ptr,
                                        buffer_length, flags);
      - label: "2"
        desc: Style 2 strict -- `);` on its own line, one arg per line
        code: |
          result = compute_with_context(
             curr_session,
             the_buffer_ptr,
             buffer_length,
             flags
          );
      - label: "3"
        desc: Style 2 hybrid -- `);` at end of last arg, one arg per line
        code: |
          result = compute_with_context(
             curr_session,
             the_buffer_ptr,
             buffer_length,
             flags);
      - label: "4"
        desc: Style 1 (aligned to opening paren), one arg per line
        code: |
          result = compute_with_context(curr_session,
                                        the_buffer_ptr,
                                        buffer_length,
                                        flags);
    guess: ["4", "1", "3", "2"]
    ranking: ["2", "4", "1", "3"]
    comment: >
      Variants 2 and 4 are close, with a slight preference for 2.
      Variant 3 is completely unacceptable and should be a HARD rule.
    notes: >
      Claude's guess was significantly wrong (V2 ranked last, actually
      first). I had judged Style 2 strict as ceremonial overhead, but
      the user values the closing-paren-on-its-own-line symmetry. V3
      promoted from "acceptable Style 2 variant" to "hard-no": the
      one-arg-per-line layout REQUIRES `);` on its own line.
    weight: 1.0

  - id: q1b-call-site-wrap-hierarchy
    topic: call-site
    date: 2026-05-20
    prompt: >
      Supplements Q1. The user surfaced a hierarchical decision tree
      for call-site wrapping that Q1 missed: there are intermediate
      preferred forms BEFORE you start spreading args across multiple
      lines. Q1's ranking only applies as the sub-ranking once even
      those intermediates don't fit.
    snippets:
      - label: "h1"
        desc: Single line (always tried first)
        code: |
          context->result = very_long_function_name(arg1, arg2, arg3);
      - label: "h2"
        desc: >
          Break at `=`. Assignment ends first line; full call (still
          single-line) on the next line at +3 indent. Same shape as
          the elf.c fix (`const ulong stack_top = ...`).
        code: |
          context->result =
             very_long_function_name(arg1, arg2, arg3);
      - label: "h3"
        desc: >
          `(` at end of name-line, ALL args on one indented line,
          `)` on its own line aligned with statement start. Used
          when h2 still doesn't fit but all args fit on one indented
          line.
        code: |
          context->result = very_long_function_name(
             arg1, arg2, arg3, arg4, arg5
          );
      - label: "h4"
        desc: >
          Args spill across multiple lines -- Q1's domain. Sub-
          ranking applies: V2 > V4 > V1 > V3 (hard-no).
        code: |
          /* see Q1 entry for the four sub-variants */
    guess: ["h1", "h2", "h3", "h4"]
    ranking: ["h1", "h2", "h3", "h4"]
    comment: >
      User-directed correction to Q1. The full hierarchy is strictly
      monotonic in this order; Q1's ranking is the sub-tree applied
      at level h4 when level h3 cannot fit.
    notes: >
      Crucial v2 modeling implication: the call-site prettiness score
      is not a single ranking over layouts but a *cascade* where each
      level scores higher than the next, and the active level depends
      on what fits given the line width, arg count, and surrounding
      indent. The score function walks the hierarchy top-down and
      returns the highest-fitting form's score.

      The break-at-= pattern (h2) was already recorded as a
      style-fix-strategy in memory (feedback_style_fix_strategies)
      from the elf.c fix, but I had not generalized it from
      "assignment wrapping" to "call-site layout." It is the same
      pattern at a different abstraction.
    weight: 1.5

  - id: q2-control-flow-nested-struct-cond
    topic: control-flow
    date: 2026-05-20
    prompt: >
      Two-clause if-condition that reads two fields of the same
      nested struct. Single-line braced form exceeds 80 cols.
    snippets:
      - label: "1"
        desc: Accept brace-on-own-line, keep condition as-is
        code: |
          if (sess->conn->state != STATE_OPEN ||
              sess->conn->kind != KIND_TCP)
          {
             return -EINVAL;
          }
      - label: "2"
        desc: Extract each sub-expression to a named local
        code: |
          const int state = sess->conn->state;
          const int kind = sess->conn->kind;

          if (state != STATE_OPEN || kind != KIND_TCP) {
             return -EINVAL;
          }
      - label: "3"
        desc: Introduce a convenience pointer one level up
        code: |
          const struct conn *const c = sess->conn;

          if (c->state != STATE_OPEN || c->kind != KIND_TCP) {
             return -EINVAL;
          }
    guess: ["3", "2", "1"]
    ranking: ["3", "1", "2"]
    comment: ""
    notes: >
      Claude got V3 right (top) but had V2 over V1 -- user has V1 over
      V2. The "1-2 exprs" guidance in CLAUDE.md is the UPPER BOUND for
      when individual-extract is acceptable, not the preferred form.
      Two extracted locals (`state`, `kind`) lose semantic anchoring
      and add to function-local count; accepting brace-on-own-line
      preserves meaning at a single layout cost. Convenience pointer
      wins because it is the minimal-disturbance refactor: shortens
      the parent reference without renaming the leaf fields, so the
      original semantic shape is preserved while the wrapping
      disappears.
    weight: 1.0

  - id: q3-decl-const-short-types
    topic: declarations
    date: 2026-05-20
    prompt: >
      Function preamble with two read-only locals -- one struct
      pointer (not reassigned, fields mutated through it) and one int
      (read but never reassigned). Types are short; no visual-weight
      argument either way.
    snippets:
      - label: "1"
        desc: const where applicable, on both
        code: |
          struct task *const ti = get_curr_task();
          const int prio = ti->priority;
      - label: "2"
        desc: const on the pointer only (*const), not on the int
        code: |
          struct task *const ti = get_curr_task();
          int prio = ti->priority;
      - label: "3"
        desc: no const anywhere
        code: |
          struct task *ti = get_curr_task();
          int prio = ti->priority;
    guess: ["1", "3", "2"]
    ranking: ["1", "2", "3"]
    comment: ""
    notes: >
      Claude got V1 right (top) but had V2 last, ranked V3 above V2.
      I read "const on pointer but not on int" as an inconsistency
      penalty -- the user doesn't see it that way. Const is
      monotonically valuable: adding it where correct is a gain,
      missing it is a loss, partial-const is strictly better than
      no-const. There's no symmetry/consistency penalty for partial
      application. The visual-weight exception only fires at higher
      type-spelling thresholds (e.g. `enum task_state`).
    weight: 1.0

  - id: q4-function-def-signature-wrap
    topic: function-shape
    date: 2026-05-20
    prompt: >
      A 4-parameter function definition with a signature too long for
      one line. Return type is on its own line per existing rule;
      question is how to lay out the parameter list itself.
    snippets:
      - label: "1"
        desc: Style 1 packed (aligned to opening paren)
        code: |
          static int
          load_segment(fs_handle *elf_h, pdir_t *pdir,
                       Elf_Phdr *phdr, ulong *end_vaddr_ref)
          {
             /* ... */
          }
      - label: "2"
        desc: Style 1 one arg per line (aligned to opening paren)
        code: |
          static int
          load_segment(fs_handle *elf_h,
                       pdir_t *pdir,
                       Elf_Phdr *phdr,
                       ulong *end_vaddr_ref)
          {
             /* ... */
          }
      - label: "3"
        desc: Style 2 strict (`(` ends line, args indented +3, `)` on own line)
        code: |
          static int
          load_segment(
             fs_handle *elf_h,
             pdir_t *pdir,
             Elf_Phdr *phdr,
             ulong *end_vaddr_ref
          )
          {
             /* ... */
          }
      - label: "4"
        desc: Style 2 with `)` glued to last arg (one arg per line)
        code: |
          static int
          load_segment(
             fs_handle *elf_h,
             pdir_t *pdir,
             Elf_Phdr *phdr,
             ulong *end_vaddr_ref)
          {
             /* ... */
          }
    guess: ["2", "1", "3", "4"]
    ranking: ["2", "1", "3", "4"]
    comment: >
      V3 and V4 are equally ugly and unacceptable. HARD RULE.
    notes: >
      Claude got the top exactly right (V2 > V1) but had a slight
      preference for V3 over V4 -- user ties them as equally
      unacceptable. Key asymmetry with Q1: for CALLS, Style 2 strict
      was the user's TOP pick (the `);` on its own line gives
      statement-level closure); for DEFINITIONS, Style 2 in any form
      is hard-no because the `{` of the body already provides closure
      and a separate `)` line creates two adjacent single-character
      lines without earning its keep. Function defs use Style 1 only;
      within Style 1, one-arg-per-line beats packed.
    weight: 1.0

  - id: q5-multiline-ternary
    topic: expressions
    date: 2026-05-20
    prompt: >
      RHS of an assignment is a ternary between two long function
      calls. Single-line doesn't fit. How to lay out the ternary.
    snippets:
      - label: "1"
        desc: >
          Assignment alone on first line, condition + branches each
          on its own indented line (CLAUDE.md-documented form).
        code: |
          new_term =
             serial_port_fwd
                ? tty_allocate_and_init_new_serial_term(serial_port_fwd)
                : tty_allocate_and_init_new_video_term(rows_buf);
      - label: "2"
        desc: Condition on the assignment line, `?` and `:` branches indented
        code: |
          new_term = serial_port_fwd
             ? tty_allocate_and_init_new_serial_term(serial_port_fwd)
             : tty_allocate_and_init_new_video_term(rows_buf);
      - label: "3"
        desc: Flatten to `if`/`else` instead of using a ternary
        code: |
          if (serial_port_fwd)
             new_term = tty_allocate_and_init_new_serial_term(serial_port_fwd);
          else
             new_term = tty_allocate_and_init_new_video_term(rows_buf);
    guess: ["1", "2", "3"]
    ranking: ["1", "2", "3"]
    comment: >
      V1 is technically best because `?` is one indent away from
      `serial_port_fwd`. V2 and V3 are both a bit ugly. User
      generally tries to avoid full if/else when possible.

      Important higher-order alternative the user volunteered:
      when the initialization is constant (cheap default), prefer
      to declare with the common choice and conditionally override
      the deviation:

         int val = common_choice;
         if (choice != expected)
            val = other_choice;

      This sidesteps the ternary entirely. Not applicable here
      because both ternary branches are non-trivial calls.
    notes: >
      Claude's guess [1, 2, 3] mostly correct on top (V1 wins) but
      had V2 and V3 in strict order; user treats them as roughly
      tied ("both a bit ugly"). The structural argument for V1: `?`
      is one indent step away from the condition `serial_port_fwd`,
      yielding visual symmetry between condition / true-branch /
      false-branch. V2 and V3 lose that.

      The volunteered fourth variant (init-with-default + override)
      is recorded as a cross-cutting pattern, not a Q5-internal
      ranking option.
    weight: 1.0

  - id: q6-naming-tight-scope-alias
    topic: naming
    date: 2026-05-20
    prompt: >
      Convenience pointer alias for a nested struct reference,
      used in ~5 statements in a small block; scope ends right
      after. Three name choices.
    snippets:
      - label: "1"
        desc: Single-letter, initial of purpose (`c` for conn)
        code: |
          const struct conn *const c = sess->conn;
          if (c->state != OPEN)
             return -EINVAL;
          rc = conn_lock(c);
          write_to_conn(c, buf, len);
          c->last_used = now;
          conn_unlock(c);
      - label: "2"
        desc: Name matches the type tag (`conn` shadowing struct conn)
        code: |
          const struct conn *const conn = sess->conn;
          if (conn->state != OPEN)
             return -EINVAL;
          rc = conn_lock(conn);
          write_to_conn(conn, buf, len);
          conn->last_used = now;
          conn_unlock(conn);
      - label: "3"
        desc: Descriptive with `_ptr` suffix (`conn_ptr`)
        code: |
          const struct conn *const conn_ptr = sess->conn;
          if (conn_ptr->state != OPEN)
             return -EINVAL;
          rc = conn_lock(conn_ptr);
          write_to_conn(conn_ptr, buf, len);
          conn_ptr->last_used = now;
          conn_unlock(conn_ptr);
    guess: ["1", "2", "3"]
    ranking: ["1", "2", "3"]
    comment: ""
    notes: >
      EXACT MATCH on first try. In tight scope where the referent is
      unambiguous, the name should be a 1-2 letter abbreviation of
      PURPOSE, not of type. The `_ptr` suffix is anti-pattern. Type-
      matching name (V2) is acceptable as second-best (the
      shadowing doesn't bother the user) but loses to the
      single-letter purpose-initial. Pattern confirmed across
      corpus: `ti` (task), `pi` (process), `h` (handle), `c`
      (conn), `ct` (curr ticks), `st` (selected ticks).
    weight: 1.0

  - id: q7-comment-magic-constant
    topic: comments
    date: 2026-05-20
    prompt: >
      A magic constant with a rationale. Three comment shapes:
      no comment, brief one-line above, full block above.
    snippets:
      - label: "1"
        desc: No comment
        code: |
          const u32 max_retries = 5;
      - label: "2"
        desc: Brief one-line comment above
        code: |
          /* Tuned empirically; 5 retries covers ~30s with default backoff */
          const u32 max_retries = 5;
      - label: "3"
        desc: Full block comment above
        code: |
          /*
           * Tuned empirically: 5 retries with the default TCP backoff
           * gives ~30 seconds total wait before giving up.
           */
          const u32 max_retries = 5;
    guess: ["2", "3", "1"]
    ranking: ["2", "3", "1"]
    comment: ""
    notes: >
      EXACT MATCH. Comments are appropriately sized: brief above-the-
      line for one-sentence rationale (sweet spot); full block when
      the explanation has genuine nuance; no comment is the worst
      because it loses the "why" entirely. The user values comments
      AND avoids over-commenting -- both at once, calibrated to the
      rationale's actual complexity.
    weight: 1.0

  - id: q8-decl-const-verbose-type
    topic: declarations
    date: 2026-05-20
    prompt: >
      A single function-scope local with a verbose type
      (`enum task_state` -- 15 chars). Read-only by intent.
      Three variants on const + name length.
    snippets:
      - label: "1"
        desc: Full const, descriptive name
        code: |
          const enum task_state state = atomic_load(&ti->state);
      - label: "2"
        desc: No const, descriptive name
        code: |
          enum task_state state = atomic_load(&ti->state);
      - label: "3"
        desc: Full const, short name to offset type's visual weight
        code: |
          const enum task_state s = atomic_load(&ti->state);
    guess: ["2", "1", "3"]
    ranking: ["2", "1", "3"]
    comment: ""
    notes: >
      EXACT MATCH. Confirms the visual-weight rule for const: above
      some type-spelling threshold (~15 chars, hit by `enum X`,
      multi-word types), the const decoration's positive value flips
      to a net negative. V3 (rename to offset) loses because it
      addresses the wrong axis: the problem is type-weight, not
      name-weight. Shortening the name doesn't reduce the
      const-on-verbose-type cost. The right move is to drop const
      and keep the descriptive name.
    weight: 1.0

  - id: q9-struct-field-comments
    topic: structs
    date: 2026-05-20
    prompt: >
      A small struct with three fields, each needing a brief
      explanatory comment that fits as a trailing inline. Three
      layouts.
    snippets:
      - label: "1"
        desc: Aligned trailing comments (all at same column)
        code: |
          struct sched_ticks {
             atomic_u64_t vruntime;        /* virtual runtime */
             atomic_u64_t deadline;        /* absolute deadline */
             u32 slice_remaining;          /* unused ticks left */
          };
      - label: "2"
        desc: Unaligned trailing (one space after `;`)
        code: |
          struct sched_ticks {
             atomic_u64_t vruntime; /* virtual runtime */
             atomic_u64_t deadline; /* absolute deadline */
             u32 slice_remaining; /* unused ticks left */
          };
      - label: "3"
        desc: Comment above each field
        code: |
          struct sched_ticks {
             /* virtual runtime */
             atomic_u64_t vruntime;
             /* absolute deadline */
             atomic_u64_t deadline;
             /* unused ticks left */
             u32 slice_remaining;
          };
    guess: ["1", "3", "2"]
    ranking: ["1", "3", "2"]
    comment: ""
    notes: >
      EXACT MATCH (fourth in a row). Aligned trailing comments are
      the corpus standard for struct field annotations. Above-the-
      line is the fallback when trailing doesn't fit. Unaligned
      trailing is the worst because it sacrifices the visual-
      alignment property for no gain.
    weight: 1.0

  - id: q10-extract-vs-inline-vs-helper
    topic: function-shape
    date: 2026-05-20
    prompt: >
      Test whether a task's state is in a set of three values
      (sleeping / stopped / traced). Compare three approaches:
      inline OR-chain, extract `ti->state` to local then OR-chain,
      or define a `task_is_blocked()` helper. Context-sensitive: how
      does the answer change with number of call sites (1, 2, 3+)?
    snippets:
      - label: "1"
        desc: Inline OR-chain, brace on own line
        code: |
          if (ti->state == TASK_STATE_SLEEPING ||
              ti->state == TASK_STATE_STOPPED  ||
              ti->state == TASK_STATE_TRACED)
          {
             do_thing(ti);
          }
      - label: "2"
        desc: Extract ti->state to a local, then OR-chain
        code: |
          enum task_state state = ti->state;

          if (state == TASK_STATE_SLEEPING ||
              state == TASK_STATE_STOPPED  ||
              state == TASK_STATE_TRACED)
          {
             do_thing(ti);
          }
      - label: "3"
        desc: Introduce a `task_is_blocked()` helper and call it
        code: |
          /* helper defined elsewhere in the same file: */
          static bool
          task_is_blocked(struct task *ti)
          {
             enum task_state state = ti->state;
             return state == TASK_STATE_SLEEPING ||
                    state == TASK_STATE_STOPPED  ||
                    state == TASK_STATE_TRACED;
          }

          /* call site: */
          if (task_is_blocked(ti))
             do_thing(ti);
    guess: ["3", "1", "2"]
    ranking: ["3", "2", "1"]
    comment: >
      Three rankings by call-site count:
      - 1 site:  [2, 1, 3] -- V3 overkill, V2 best (1 local saves
        3 repeated references)
      - 2 sites: [3, 2, 1] -- V3 wins but V2 close
      - 3+ sites: [3, 2, 1] -- V3 a strong preference

      Also: `||` (and presumably `&&`) operators on consecutive
      lines should be COLUMN-ALIGNED, padding with extra space if
      needed. My snippets had unaligned `||` -- corrected above.
    notes: >
      The 2-site case is recorded as canonical ranking since the
      question stated "1-2 sites."

      Major model correction: extraction is justified when
      SAVINGS > COST. Cost = number of new locals introduced.
      Savings = number of use sites where the local replaces a
      repeated expression. This unifies Q2 (cost 2, savings 2 ->
      loses to brace-on-own-line) and Q10 single-site (cost 1,
      savings 3 -> beats brace-on-own-line).

      Helper-function abstraction has a different cost shape:
      one-time definition cost amortized across call sites. At
      1 site it's overkill; at 2 sites it ties extract-local; at
      3+ sites it dominates strongly.

      New concrete rule surfaced: align `||` and `&&` operators
      column-wise across multi-line boolean expressions. This is
      a formatting rule that could eventually be enforced by the
      linter.
    weight: 1.5

  - id: q12-switch-case-layout
    topic: control-flow
    date: 2026-05-20
    prompt: >
      switch over an enum with three short case bodies + default.
      Three layouts compared: case +3 from switch, case flush with
      switch (Linux-kernel style), case bodies braced per-case.
    snippets:
      - label: "1"
        desc: case +3 from switch, body +3 from case
        code: |
          switch (op) {
             case OP_READ:
                rc = do_read(buf, len);
                break;
             case OP_WRITE:
                rc = do_write(buf, len);
                break;
             case OP_FLUSH:
                rc = do_flush();
                break;
             default:
                return -EINVAL;
          }
      - label: "2"
        desc: case flush with switch (Linux-kernel style)
        code: |
          switch (op) {
          case OP_READ:
             rc = do_read(buf, len);
             break;
          case OP_WRITE:
             rc = do_write(buf, len);
             break;
          case OP_FLUSH:
             rc = do_flush();
             break;
          default:
             return -EINVAL;
          }
      - label: "3"
        desc: braced case bodies (per-case scope blocks)
        code: |
          switch (op) {
             case OP_READ: {
                rc = do_read(buf, len);
                break;
             }
             case OP_WRITE: {
                rc = do_write(buf, len);
                break;
             }
             case OP_FLUSH: {
                rc = do_flush();
                break;
             }
             default:
                return -EINVAL;
          }
    guess: ["1", "2", "3"]
    ranking: ["1", "3", "2"]
    comment: >
      V1 default. V3 is required (not optional) when per-case
      variables are needed. V2 is forbidden -- hard rule.
    notes: >
      Two corrections to Claude's model:

      1. V2 (Linux-kernel-style case-flush-with-switch) is a HARD
         rule violation. Not "less preferred" -- forbidden.
         Probably the same family-deviation as Tilck's 3-space
         indent vs Linux's tab/8-space: the case-flush form
         belongs to that other style family and is rejected as a
         unit.

      2. V3 is NOT a stylistic alternative to V1 -- it is a
         MANDATORY escalation when a case has its own local
         declarations. Without braces, declaring a local inside a
         case is broken (case labels don't introduce scope in C).
         The choice "V1 or V3" is decided by language semantics,
         not aesthetics.

      Revised model: switch-case has a hard rule (case must be
      indented +3 from switch) and a conditional rule (per-case
      braces required iff case has locals). Linter should flag V2
      shape as a hard violation and verify the brace presence
      matches the locals-present condition.
    weight: 1.5

  - id: q13-include-ordering
    topic: file-org
    date: 2026-05-20
    prompt: >
      `#include` ordering at the top of a kernel .c file with
      headers from four subtrees (tilck_gen_headers, tilck/common,
      tilck/kernel, tilck/mods). Three orderings compared.
    snippets:
      - label: "1"
        desc: Grouped by subtree, blank lines between groups
        code: |
          #include <tilck_gen_headers/config_global.h>

          #include <tilck/common/basic_defs.h>
          #include <tilck/common/string_util.h>

          #include <tilck/kernel/sync.h>
          #include <tilck/kernel/process.h>
          #include <tilck/kernel/sched.h>

          #include <tilck/mods/console.h>
      - label: "2"
        desc: Single contiguous block, ordered by subtree, no blank lines
        code: |
          #include <tilck_gen_headers/config_global.h>
          #include <tilck/common/basic_defs.h>
          #include <tilck/common/string_util.h>
          #include <tilck/kernel/sync.h>
          #include <tilck/kernel/process.h>
          #include <tilck/kernel/sched.h>
          #include <tilck/mods/console.h>
      - label: "3"
        desc: Strict alphabetical, no semantic grouping
        code: |
          #include <tilck/common/basic_defs.h>
          #include <tilck/common/string_util.h>
          #include <tilck/kernel/process.h>
          #include <tilck/kernel/sched.h>
          #include <tilck/kernel/sync.h>
          #include <tilck/mods/console.h>
          #include <tilck_gen_headers/config_global.h>
    guess: ["1", "2", "3"]
    ranking: ["1", "2", "3"]
    comment: V3 is forbidden -- hard rule.
    notes: >
      Claude got the order right [1, 2, 3] but missed that V3 is
      not "least preferred" but a HARD RULE violation. The reason
      is structural: alphabetical ordering forces
      `tilck_gen_headers/config_global.h` to the LAST position,
      whereas it must come FIRST -- it carries generated config
      defines that other headers in the project depend on. V3
      breaks two properties at once: required-first ordering for
      gen_headers, and required-grouping by subtree.

      The real V1 vs V2 soft choice is whether to insert blank
      lines between subtree groups. V1 (with blanks) wins; V2
      (single block) is acceptable.
    weight: 1.0

  - id: q14-helper-placement
    topic: function-shape
    date: 2026-05-20
    prompt: >
      A small helper called by exactly one caller in the same .c
      file. Where do you place the helper? Three options: above the
      caller (no fwd decl), below the caller (with fwd decl at top),
      or in a separate .c file with a header.
    snippets:
      - label: "1"
        desc: Helper above the caller (no forward declaration)
        code: |
          static int
          validate_request(struct req *r)
          {
             /* ... validate, return -EINVAL on bad ... */
             return 0;
          }

          static int
          process_request(struct req *r)
          {
             int rc = validate_request(r);
             if (rc < 0)
                return rc;

             /* ... do the actual work ... */
             return 0;
          }
      - label: "2"
        desc: Caller above; helper below with forward declaration at top of file
        code: |
          /* forward declaration at top of file */
          static int validate_request(struct req *r);

          static int
          process_request(struct req *r)
          {
             int rc = validate_request(r);
             if (rc < 0)
                return rc;
             /* ... */
             return 0;
          }

          static int
          validate_request(struct req *r)
          {
             /* ... */
             return 0;
          }
      - label: "3"
        desc: Helper in a separate .c file with a header declaration
        code: |
          /* request_helpers.h */
          int validate_request(struct req *r);

          /* request_helpers.c */
          int
          validate_request(struct req *r)
          {
             /* ... */
             return 0;
          }

          /* request_main.c */
          #include "request_helpers.h"

          static int
          process_request(struct req *r)
          {
             int rc = validate_request(r);
             /* ... */
             return 0;
          }
    guess: ["1", "2", "3"]
    ranking: ["1", "2", "3"]
    comment: >
      V2 (helper below caller with forward decl) is allowed ONLY
      when re-ordering cannot avoid the forward declaration (e.g.
      mutual recursion). Placing a helper below its caller is
      "very bad" when reordering would work.

      V3 ranks last only because this example stipulated a single
      caller and a genuinely private helper. If the helper were
      part of a broader interface used by multiple callers, V3
      would WIN -- "each function should be placed in the right
      file, not at random."
    notes: >
      Got the flat ranking right but missed two structural layers:

      1. V2 is a HARD RULE violation whenever reordering would
         eliminate the forward declaration. Forward decls are
         allowed only when unavoidable (mutual recursion, or some
         genuine forcing function). Placing a helper below its
         caller for no language-imposed reason is rejected.

      2. V3 is context-dependent. For a TRULY private single-
         caller helper, V3 is overkill -- artificial file split.
         For a helper that conceptually belongs to a shared
         interface, V3 WINS -- the helper should live in the
         appropriate .c/.h pair, not as a local static.

      The real decision is a placement tree, not a ranking:

        Helper conceptually private to one caller?
          YES -> V1 (above caller, same file).
                 V2 forbidden if reordering avoids fwd decl.
                 V3 wrong (artificial split).
          NO (part of broader interface) -> V3 (right file).

      The under-appreciated insight: WHERE a function lives is a
      style decision, not just "wherever it happens to be needed."
      I keep treating file/scope choices as mechanical when they
      carry conceptual weight.
    weight: 1.5

  - id: q15-phase-local-scope
    topic: function-shape
    date: 2026-05-20
    prompt: >
      A two-phase function with a temp variable `h` used only in
      phase 1. Three placements for h's declaration: function-top
      (C89), mid-block at point of use (C99), and explicit `{ }`
      sub-block.
    snippets:
      - label: "1"
        desc: Declare h at function top; stays in scope through phase 2
        code: |
          static int
          do_work(struct task *ti)
          {
             struct fs_handle *h;
             int rc;

             /* phase 1: open file, parse config */
             h = open_file(ti, "/etc/config");
             if (!h)
                return -ENOENT;
             parse_config(h);
             close_handle(h);

             /* phase 2: apply config (h not used) */
             rc = apply_config();
             return rc;
          }
      - label: "2"
        desc: Declare h mid-function at the point of use (C99 style)
        code: |
          static int
          do_work(struct task *ti)
          {
             int rc;

             /* phase 1: open file, parse config */
             struct fs_handle *h = open_file(ti, "/etc/config");
             if (!h)
                return -ENOENT;
             parse_config(h);
             close_handle(h);

             /* phase 2: apply config */
             rc = apply_config();
             return rc;
          }
      - label: "3"
        desc: Scope h to an explicit `{ ... }` sub-block
        code: |
          static int
          do_work(struct task *ti)
          {
             int rc;

             /* phase 1 -- h scoped to this block */
             {
                struct fs_handle *h = open_file(ti, "/etc/config");
                if (!h)
                   return -ENOENT;
                parse_config(h);
                close_handle(h);
             }

             /* phase 2: apply config */
             rc = apply_config();
             return rc;
          }
    guess: ["2", "3", "1"]
    ranking: ["3", "1", "2"]
    comment: >
      V3 is the most elegant when scope-narrowing pays off. V1 is
      acceptable when phase 2 is minimal (V3 ~= V1 in such cases).
      V2 (mid-function decls) is UGLY and should be avoided.

      Escalation when the sub-block grows too large or would need
      its own nested sub-block: extract to a separate function.
    notes: >
      Three model corrections relative to Claude's guess [2, 3, 1]:

      1. V2 (C99 mid-block decl) is ugly and should be avoided.
         The corpus has cases of it (kernel/signal.c:21-33,
         kernel/poll.c:21) but those are unpolished/rushed code,
         NOT a style endorsement. The CLAUDE.md-documented rule
         "non-const locals at top of enclosing block" IS the rule.
         My earlier inference (dropping the linter rule based on
         corpus drift) was wrong; revisit re-enabling it.

      2. V3 (explicit `{ }` sub-block) is the most elegant form,
         not overkill. It's the user-endorsed escape valve for
         narrowing scope without mid-block decls.

      3. V1 is acceptable when phase 2 is minimal -- the "wasted
         scope" cost is proportional to how much of the function
         doesn't use the variable.

      Refined rule: declare at top of ENCLOSING SCOPE (function
      body, control-flow body, or sub-block) -- never mid-scope.
      The sub-block exists precisely to enable narrowing without
      breaking the top-of-scope rule.

      Escalation cascade from Q15:
        phase sizes minimal       -> V1 ~= V3 (V3 nicer but V1 ok)
        phases non-trivial         -> V3 strongly preferred
        sub-block becomes too big  -> EXTRACT to a helper function
        would need nested sub-block-> also extract

      This is the function-shape rule the user has been pointing
      at: scope locals as narrowly as practical, but escalate to
      function extraction before nesting gets deep.
    weight: 2.0

  - id: q16-macro-vs-inline
    topic: macros
    date: 2026-05-20
    prompt: >
      A small reusable computation (align-up to a power of 2)
      used in ~10 places across the kernel. Three implementations:
      function-like macro, static inline in a header, regular
      non-inline function.
    snippets:
      - label: "1"
        desc: Function-like macro
        code: |
          #define ALIGN_UP(n, a)   (((n) + (a) - 1) & ~((a) - 1))
      - label: "2"
        desc: static inline function in a header
        code: |
          static inline ulong
          align_up(ulong n, ulong a)
          {
             return (n + a - 1) & ~(a - 1);
          }
      - label: "3"
        desc: Regular non-inline function with header declaration
        code: |
          /* header */
          ulong align_up(ulong n, ulong a);

          /* implementation in .c */
          ulong
          align_up(ulong n, ulong a)
          {
             return (n + a - 1) & ~(a - 1);
          }
    guess: ["2", "1", "3"]
    ranking: ["2", "1", "3"]
    comment: >
      Default ranking for a single-type small expression. Two
      qualifications:

      Type-genericity: when the operation must work across N
      integer types, the calculus shifts. At 2 types, V1 ~= V2
      (V2 requires two inline impls or a dispatch layer). At 3+
      types, V1 wins outright -- macros are the most generic
      form.

      Compiler-inlining failure: in some cases -O3 doesn't
      actually inline `static inline` functions (the user has
      seen this in terminal code). When that happens, V1 is
      forced. Document the pragmatic exception with a comment.
    notes: >
      EXACT MATCH on the default ranking. The valuable info is in
      the qualifications.

      Two model extensions surfaced:

      1. Type-genericity dimension: C lacks templates, so multi-
         type small operations don't fit V2 cleanly. Either
         duplicate V2 per type, build a dispatch layer
         (atomic_load/store style via _Generic or X-macros), or
         use a macro. Threshold: 2 types ~= 50/50; 3+ types V1
         dominates.

      2. Compiler-inlining-failure escape: when `-O3` doesn't
         actually inline the inline function (real example:
         terminal code), the user falls back to V1 with a
         comment explaining the why. This generalizes to a
         broader rule: when going against the stated default
         preference for pragmatic reasons, DOCUMENT the why in
         a comment so the next reader (or v2 linter) knows it
         is an intentional exception, not drift.
    weight: 1.0

  - id: q17-function-prologue-comment
    topic: comments
    date: 2026-05-20
    prompt: >
      Function with slightly non-obvious return-code behavior.
      Three prologue-comment shapes: none, brief one-liner, full
      block with purpose/params/return-codes.
    snippets:
      - label: "1"
        desc: No prologue comment
        code: |
          static int
          parse_config_file(struct task *ti, const char *path)
          {
             /* ... */
          }
      - label: "2"
        desc: Brief one-line comment above (paraphrase of the name)
        code: |
          /* Parse the config file at `path` for task `ti` */
          static int
          parse_config_file(struct task *ti, const char *path)
          {
             /* ... */
          }
      - label: "3"
        desc: Full block documenting purpose, params, return-codes
        code: |
          /*
           * Parse the config file at `path` for the given task.
           *
           * Returns 0 on success, -ENOENT if the file is missing,
           * -EINVAL if the file is malformed.
           */
          static int
          parse_config_file(struct task *ti, const char *path)
          {
             /* ... */
          }
    guess: null
    ranking: null
    comment: >
      V2 is dismissed as "pro-forma" -- a one-liner that just
      restates the function name adds no value. The fix is to
      improve the name, not to add a paraphrase.

      Interface vs implementation are distinct concerns. Interface
      clarification (return-codes, preconditions, why-to-use)
      goes in a V3-style prologue if needed (rare). Implementation
      details go inside the function body. A prologue that mixes
      both is wrong shape.

      Escalation when implementation comments make the function
      too long: SPLIT the function, then add V3-style prologues
      on the split pieces.
    notes: >
      Major reframe. Claude had V2 modeled as the sweet spot for
      simple functions. The user rejects V2 categorically:

        - A one-liner that paraphrases the function name carries
          no information beyond the name itself. The function
          name is the primary documentation channel for purpose.
          Comments are for things the name CAN'T carry.

        - When the function NAME doesn't convey purpose, the
          right move is to RENAME, not to add a V2 comment.

      The user-corrected decision tree (NOT a flat ranking):

        function needs commenting?
          name doesn't convey purpose     -> fix the name (no V2)
          interface has non-obvious bits  -> V3 prologue
          implementation tricky details   -> inline body comments
          too much to explain inline      -> SPLIT, then V3 prologues

      This unifies with:
        - Q14's "place functions in the right file/place"
        - Q15's "extract to helper when sub-block grows"
        - Q11's "if unsure, pick V3 (always safe)"

      The recurring meta-principle: when a piece of code's shape
      is fighting the desired comment/structure, the right
      response is often to RESTRUCTURE (rename, split, move)
      rather than to add scaffolding (V2-style comments, deep
      nesting, mid-block decls).

      Note: ranking field is null because the user's answer
      structurally rejects the flat-ranking framing for this
      question.
    weight: 2.0

  - id: q18-blank-line-placement
    topic: whitespace
    date: 2026-05-20
    prompt: >
