      init only works when values are SELF-IDENTIFYING. Distinct
      types or clearly distinguishable literals are OK; multiple
      booleans, multiple ints with similar shapes, multiple
      pointers of the same type -- all force back to designators.

      For the linter: detect compound-literal initializers; rank
