# Migrated from other/ci/riscv64.yml (Azure Pipelines).
name: Tilck riscv64

on:
  push:
    branches-ignore: [readme*, temp-*, exp-*]
    paths:
      - '.github/workflows/ci-riscv64.yml'
      - 'other/busybox.config'
      - 'kernel/**'
      - 'modules/**'
      - 'include/**'
      - 'common/**'
      - 'boot/**'
      - 'tests/**'
      - 'userapps/**'
      - 'scripts/**'
      - 'config/**'
      - '!README.md'
      - '!docs/**'
      - '!scripts/configurator/**'
      - '!kernel/arch/generic_x86/**'
      - '!kernel/arch/i386/**'
      - '!kernel/arch/x86_64/**'
      - '!include/tilck/kernel/arch/generic_x86/**'
      - '!include/tilck/kernel/arch/i386/**'
      - '!include/tilck/kernel/arch/x86_64/**'
      - '!include/tilck/common/arch/generic_x86/**'
      - '!include/tilck/common/arch/i386/**'
      - '!include/tilck/common/arch/x86_64/**'
  # PR validation is off to match Azure (push-only). To enable, add a
  # 'pull_request:' block mirroring the push paths above, targeting master.
  workflow_dispatch:

env:
  RUNNING_IN_CI: 1
  # let git trust the root-owned container checkout (the build runs git)
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: '*'
  ARCH: riscv64
  TCROOT: /tc
  GTEST_SHUFFLE: 0
  TILCK_NO_LOGO: 1

jobs:

  gcc_12_4:
    runs-on: ubuntu-24.04
    container: ghcr.io/vvaltchev/tilck-riscv64:latest
    strategy:
      fail-fast: false
      matrix:
        gen:
          - gcc
          - gcc_rel
          - gcc_fast_rel
          - gcc_nocow
          - gcc_no_nested_irq_tracking
          - minimal
          - gcc_small_offt
    env:
      GCC_TC_VER: 12.4.0
      CMAKE_ARGS: >-
        -DKRN_KMALLOC_FREE_MEM_POISONING=1
        -DKERNEL_UBSAN=1
        -DKERNEL_SAT=1
        -DKRN_HANG_DETECTION=1
        -DKRN_MINIMAL_TIME_SLICE=1
        -DKRN_RESCHED_ENABLE_PREEMPT=1
        -DTIMER_HZ=500
    steps:
      - uses: actions/checkout@v5
      - run: printenv
      - run: ./scripts/build_generators/${{ matrix.gen }}
      - run: make -j
      - run: ./build/st/run_all_tests -c

  gcc_13_3:
    runs-on: ubuntu-24.04
    container: ghcr.io/vvaltchev/tilck-riscv64:latest
    strategy:
      fail-fast: false
      matrix:
        gen:
          - gcc
          - gcc_rel
          - gcc_fast_rel
          - gcc_nocow
          - gcc_no_nested_irq_tracking
          - minimal
          - gcc_small_offt
    env:
      GCC_TC_VER: 13.3.0
      CMAKE_ARGS: >-
        -DKRN_KMALLOC_FREE_MEM_POISONING=1
        -DKERNEL_UBSAN=1
        -DKERNEL_SAT=1
        -DKRN_HANG_DETECTION=1
        -DKRN_MINIMAL_TIME_SLICE=1
        -DKRN_RESCHED_ENABLE_PREEMPT=1
        -DTIMER_HZ=500
    steps:
      - uses: actions/checkout@v5
      - run: printenv
      - run: ./scripts/build_generators/${{ matrix.gen }}
      - run: make -j
      - run: ./build/st/run_all_tests -c

  coverage:
    runs-on: ubuntu-24.04
    container: ghcr.io/vvaltchev/tilck-riscv64:latest
    environment: Tilck
    env:
      GCC_TC_VER: 12.4.0
      DUMP_COV: 1
      REPORT_COV: 1
      CMAKE_ARGS: >-
        -DKRN_KMALLOC_FREE_MEM_POISONING=1
        -DKERNEL_UBSAN=1
        -DKERNEL_SAT=1
        -DKRN_HANG_DETECTION=1
    steps:
      - uses: actions/checkout@v5
      - run: printenv
      - run: ./scripts/build_generators/gcc_gcov
      - run: make -j
      - run: ./build/st/run_all_tests -c
      - name: Gen kernel gcov report and upload to codecov
        run: ./build/scripts/generate_kernel_coverage_report --codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
