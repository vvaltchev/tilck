# Builds the toolchain container images (other/containers/tilck-*) used by the
# kernel CI workflows and pushes them to the GitHub Container Registry
# (ghcr.io/<owner>/<image>). The CI workflows only *consume* these images (via
# `container:`); they are (re)built here — on demand, weekly, or when a
# Dockerfile / the toolchain scripts change — so a CI run never rebuilds one.
# (The toolchain-test jobs run on the official distro images directly.)
name: Build CI containers

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image to (re)build
        type: choice
        default: all
        options:
          - all
          - tilck-i386
          - tilck-riscv64
          - tilck-x86_64
  schedule:
    # Weekly (Mon 04:00 UTC) to pick up base-image / toolchain updates.
    - cron: '0 4 * * 1'
  push:
    branches: [master]
    paths:
      - 'other/containers/**'
      - '.github/workflows/build-containers.yml'
      - 'scripts/build_toolchain'
      - 'scripts/pkgmgr/**'

permissions:
  contents: read
  packages: write

jobs:

  # Pick the image set: the dispatch choice, or every other/containers/* dir.
  select:
    runs-on: ubuntu-24.04
    outputs:
      images: ${{ steps.pick.outputs.images }}
    steps:
      - uses: actions/checkout@v5
      - id: pick
        run: |
          sel='${{ inputs.image }}'
          if [ -n "$sel" ] && [ "$sel" != all ]; then
             images="[\"$sel\"]"
          else
             images=$(for d in other/containers/*/; do
                [ -f "${d}Dockerfile" ] && basename "$d"
             done | jq -R . | jq -sc .)
          fi
          echo "images=$images" >> "$GITHUB_OUTPUT"

  build:
    needs: select
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.select.outputs.images) }}
    env:
      IMG: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
    steps:
      - uses: actions/checkout@v5

      # The tilck-* images build a full cross toolchain; free the runner's
      # preinstalled SDKs so there is room for it.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: other/containers/${{ matrix.image }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMG }}:latest
            ${{ env.IMG }}:${{ github.sha }}
          # Reuse unchanged layers across rebuilds (per-image scope).
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
