# Migrated from other/ci/tc-debian-i386.yml (Azure Pipelines).
name: Toolchain debian i386

on:
  push:
    branches-ignore: [readme*, temp-*, exp-*]
    paths:
      - '.github/workflows/ci-tc-debian-i386.yml'
      - 'scripts/build_toolchain'
      - 'scripts/pkgmgr/**'
      - '!README.md'
      - '!**/*.md'
  workflow_dispatch:

env:
  RUNNING_IN_CI: 1
  # let git trust the root-owned container checkout (the build runs git)
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: '*'
  GTEST_SHUFFLE: 0
  TILCK_NO_LOGO: 1
  ARCH: i386

jobs:
  toolchain:
    runs-on: ubuntu-22.04
    container: debian:stable-slim
    steps:
      - uses: actions/checkout@v4
      - run: printenv
      - name: Run pkgmgr unit tests
        run: ./scripts/build_toolchain -t
      - name: Install pkgs
        run: ./scripts/build_toolchain
      - name: Build gtest
        run: ./scripts/build_toolchain -s gtest
      - name: Build lcov
        run: ./scripts/build_toolchain -s lcov
      - name: Download libmusl
        run: ./scripts/build_toolchain -s libmusl
      - name: Build ncurses
        run: ./scripts/build_toolchain -s ncurses
      - name: Build micropython
        run: ./scripts/build_toolchain -s micropython
      - name: Build vim
        run: ./scripts/build_toolchain -s vim
      - name: Build tfblib
        run: ./scripts/build_toolchain -s tfblib
      - name: Build lua
        run: ./scripts/build_toolchain -s lua
      - name: Build treecmd
        run: ./scripts/build_toolchain -s treecmd
      - name: Build tcc
        run: ./scripts/build_toolchain -s tcc
      - name: Build freedoom
        run: ./scripts/build_toolchain -s freedoom
      - name: Build fbdoom
        run: ./scripts/build_toolchain -s fbdoom
      - name: Build the kernel
        run: make -j
      - name: Build the unit tests
        run: make -j gtests
      - name: Run the unit tests
        run: ./build/gtests
      - name: Run the system tests
        run: ./tests/runners/ci_run_all_tests_wrapper -c
